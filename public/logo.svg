<svg width="640" height="210" viewBox="0 0 640 210" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Guido — logo</title>
  <desc>Monogramme en forme de G, composé d'un anneau et d'un ruban en pointe évoquant un marque-page qui guide, suivi du nom "guido".</desc>

  <!-- Badge -->
  <circle cx="115" cy="110" r="100" fill="#1E2A4A"/>

  <!-- Anneau du "G" -->
  <path d="M 157.6 139.8 A 54 54 0 1 1 157.6 80.2"
        fill="none" stroke="#E0A63C" stroke-width="24" stroke-linecap="round"/>

  <!-- Ruban / marque-page en pointe -->
  <polygon points="115,96 173,96 197,110 173,124 115,124" fill="#E0A63C"/>

  <!-- Wordmark -->
  <text x="258" y="140" font-family="Arial, Helvetica, sans-serif" font-weight="700"
        font-size="92" letter-spacing="-1" fill="#1E2A4A">guido</text>

  <!-- Tagline -->
  <text x="260" y="172" font-family="Arial, Helvetica, sans-serif" font-weight="700"
        font-size="19" letter-spacing="4" fill="#C98A2E">EBOOKS &amp; GUIDES</text>
</svg>
